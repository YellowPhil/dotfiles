# rxyhn's aesthetic alacritty
# configuration for alacritty, the GPU enhanced terminal emulator.
import:
  - .config/alacritty/themes/tender.yml

env:
  TERM: xterm-256color

window:
  opacity: 0.90
  dynamic_padding: true
  padding:
    x: 25
    y: 25

font:
  normal:
    family: Fira Code
    style: Regular

  bold:
    family: Fira Code
    style: Bold

  italic:
    family: Fira Code
    style: Italic

  bold_italic:
    family: Iosevka Nerd Font Mono
    style: Bold Italic

  size: 12

  offset:
    x: 0
    y: 0

cursor:
  style: Underline


working_directory: None

key_bindings:
  - {key: Return, mods: Super, action: SpawnNewInstance}


live_config_reload: true
# BEGIN ACE
colors:
  primary:
    background: '#090B14'
    foreground: '#bedfd5'
  cursor:
    text:       '#090B14'
    cursor:     '#bedfd5'
  normal:
    black:      '#090B14'
    red:        '#224D4E'
    green:      '#19526A'
    yellow:     '#1D9468'
    blue:       '#196392'
    magenta:    '#4E588F'
    cyan:       '#42ABA8'
    white:      '#bedfd5'
  bright:
    black:      '#859c95'
    red:        '#224D4E'
    green:      '#19526A'
    yellow:     '#1D9468'
    blue:       '#196392'
    magenta:    '#4E588F'
    cyan:       '#42ABA8'
    white:      '#bedfd5'
# END ACE