##========================= Corners =========================#
corner-radius = 10;
rounded-corners-exclude = [
    # "!window_type = 'normal'",
    # "class_g ?= 'rofi'",
    #"class_g = 'firefox' && argb"
];
#
##========================= Shadows =========================#
#shadow = false;
shadow-radius = 30;
shadow-offset-x = -30;
shadow-offset-y = -30;
shadow-opacity = 0.50;
#
shadow-exclude = [
    "class_g = 'slop'",
    "window_type = 'menu'",
    "window_type = 'desktop'",
    "class_g = 'Firefox' && window_type *= 'utility'",
    "_GTK_FRAME_EXTENTS@:c"
];
#
##========================= Fading =========================#
#fading = false;
#fade-in-step = 0;
#fade-out-step = 0;
#fade-delta = 0;
#
#no-fading-openclose = true
#no-fading-destroyed-argb = true
#
#fade-exclude = [
#  "class_g = 'slop'"   # maim
#]
#
##========================= Opacity =========================#
#inactive-opacity = 0.5;
#frame-opacity = 1;
#inactive-opacity-override = false;
#active-opacity = 1.0;
#inactive-dim = 0.0;
#
#focus-exclude = [
#	"class_g = 'Cairo-clock'",
#	"class_g ?= 'rofi'",
#	"class_g ?= 'slop'"
#];
#
#opacity-rule = [
#  "85:class_g     = 'splash'"
